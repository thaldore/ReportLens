services:
  # ── Microsoft SQL Server (Ortak Veritabanı) ───────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: reportlens-mssql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -Q 'SELECT 1' -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  # ── Ollama (Yerel LLM Motoru - Paylaşımlı) ────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: reportlens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── ReportLens Python (Mevcut Sistem) ─────────────────────────────
  python-app:
    build: 
      context: ./ReportLens-Python
    container_name: reportlens-python-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MSSQL_HOST=mssql
      - MSSQL_USER=sa
      - MSSQL_PASS=YourStrongPassword123!
      - MSSQL_DB=ReportLensDB
      - MODEL_ID=llama3.1:8b
      - EMBEDDING_MODEL=nomic-embed-text
      - AGNO_TELEMETRY=false
    depends_on:
      mssql:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./ReportLens-Python/Data:/app/Data
    restart: unless-stopped


  # ── ReportLens .NET Backend (Taslak) ──────────────────────────────
  # (Bu bölüm .NET projesi hazır olduğunda aktif edilebilir)
  # dotnet-backend:
  #   build: ./ReportLens-Microsoft-Agent-Framework/backend
  #   container_name: reportlens-dotnet-backend
  #   environment:
  #     - ConnectionStrings__DefaultConnection=Server=mssql;Database=ReportLensDB;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
  #   depends_on:
  #     - mssql

volumes:
  mssql_data:
    name: reportlens_mssql_data
  ollama_data:
    name: reportlens_ollama_data
