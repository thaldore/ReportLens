services:
  # ── Streamlit Arayüzü ─────────────────────────────────────────────
  streamlit:
    build: .
    container_name: reportlens-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./Data:/app/Data
      - ./core:/app/core
      - ./ui:/app/ui
      - ./scripts:/app/scripts
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - MODEL_ID=llama3.1:8b
      - EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama (Yerel LLM Motoru) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: reportlens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ── Qdrant (Vektör Veritabanı) ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: reportlens-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  ollama_data:
    name: reportlens_ollama_data
  qdrant_storage:
    name: reportlens_qdrant_storage
