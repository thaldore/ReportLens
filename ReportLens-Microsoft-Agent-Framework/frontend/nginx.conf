# Nginx konfigürasyonu — ReportLens MAF Frontend
# Port 80 (docker-compose.yml ile dış port 3001'e map edilir)
# /api/* isteklerini .NET backend'e (8001) yönlendirir.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Statik dosyalar — cache
    location ~* \.(css|js|html|ico|png|jpg|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
